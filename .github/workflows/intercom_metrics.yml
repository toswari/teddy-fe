name: Intercom Metrics Extraction

on:
  workflow_dispatch:
    inputs:
      run_slack_report:
        description: 'Also generate and send Slack report'
        required: false
        default: 'true'
  schedule:
    - cron: '0 13 * * *'  # Daily 13:00 UTC (~09:00 US Eastern during DST, 08:00 standard)

permissions:
  contents: read

jobs:
  extract:
    runs-on: self-hosted
    env:
      INTERCOM_ACCESS_TOKEN: ${{ secrets.INTERCOM_ACCESS_TOKEN }}
      INTERCOM_SLACK_BOT_TOKEN: ${{ secrets.INTERCOM_SLACK_BOT_TOKEN }}
      INTERCOM_SLACK_CHANNEL: ${{ secrets.INTERCOM_SLACK_CHANNEL }}
      INTERCOM_SLACK_ALERTS_CHANNEL: ${{ secrets.INTERCOM_SLACK_ALERTS_CHANNEL }}
      REPORT_TIMEZONE: UTC
      EXCLUDE_SPAM_CONVERSATIONS: 'true'
      PAGINATE_CONVERSATIONS: 'true'
      CONVERSATION_PAGE_SIZE: '50'
      CONVERSATION_MAX_PAGES: '2'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r support/slack_metrics/requirements.txt

      - name: Run metrics extraction
        working-directory: support/slack_metrics
        run: |
          python intercom_metrics.py

      - name: List generated artifacts
        working-directory: support/slack_metrics
        run: |
          ls -1 intercom_metrics_*.json || true

      - name: Upload latest metrics JSON
        uses: actions/upload-artifact@v4
        with:
          name: intercom-metrics-json
          path: support/slack_metrics/intercom_metrics_*.json
          if-no-files-found: warn

      - name: Run Slack reporter (optional)
        if: ${{ github.event.inputs.run_slack_report == 'true' }}
        working-directory: support/slack_metrics
        run: |
          latest=$(ls -t intercom_metrics_*.json | head -n 1)
          python slack_reporter.py "$latest"

