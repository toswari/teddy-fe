name: Clarifai Model Load Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        type: choice
        options:
          - prod
          - dev
          - test
        default: prod
      pat:
        description: 'Clarifai Personal Access Token (PAT) - not required for test mode'
        required: false
        type: string
      model_url:
        description: 'Clarifai Model URL - not required for test mode'
        required: false
        type: string
        default: 'https://clarifai.com/test/test/models/test'
      duration:
        description: 'Test duration in seconds'
        required: true
        type: number
        default: 60
      users:
        description: 'Number of concurrent users'
        required: false
        type: number
        default: 10
      spawn_rate:
        description: 'Users to spawn per second'
        required: false
        type: number
        default: 1
      deployment_user_id:
        description: 'Clarifai Deployment User ID (optional)'
        required: false
        type: string
        default: ''

jobs:
  load-test:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scripts/locust/locust_v2/requirements.txt

      - name: Validate Model URL
        if: inputs.environment != 'test'
        run: |
          MODEL_URL="${{ inputs.model_url }}"

          # Different URL patterns for dev vs prod
          if [ "${{ inputs.environment }}" == "dev" ]; then
            # Dev URL format: https://web-dev.clarifai.com/user_id/app_id/models/model_id
            if [[ ! "$MODEL_URL" =~ ^https://web-dev\.clarifai\.com/.+/.+/models/.+ ]]; then
              echo "Error: Invalid dev model URL format."
              echo "Expected: https://web-dev.clarifai.com/user_id/app_id/models/model_id"
              echo "Got: $MODEL_URL"
              exit 1
            fi
          else
            # Prod URL format: https://clarifai.com/user_id/app_id/models/model_id
            if [[ ! "$MODEL_URL" =~ ^https://clarifai\.com/.+/.+/models/.+ ]]; then
              echo "Error: Invalid prod model URL format."
              echo "Expected: https://clarifai.com/user_id/app_id/models/model_id"
              echo "Got: $MODEL_URL"
              exit 1
            fi
          fi

          echo "✓ Model URL validated: $MODEL_URL"

      - name: Set Environment Variables
        id: set-env
        run: |
          if [ "${{ inputs.environment }}" == "test" ]; then
            echo "TEST_MODE=true" >> $GITHUB_ENV
            echo "Using TEST mode (mock test - no real API calls)"
          elif [ "${{ inputs.environment }}" == "dev" ]; then
            echo "CLARIFAI_API_BASE=https://api-dev.clarifai.com" >> $GITHUB_ENV
            echo "Using DEV environment (api-dev.clarifai.com)"
          else
            echo "Using PROD environment (api.clarifai.com - default)"
          fi

      - name: Warmup Model Check
        if: inputs.environment != 'test'
        env:
          CLARIFAI_PAT: ${{ inputs.pat }}
          CLARIFAI_MODEL_URL: ${{ inputs.model_url }}
          CLARIFAI_DEPLOYMENT_USER_ID: ${{ inputs.deployment_user_id }}
        run: |
          echo "=== Model Warmup Check ==="
          echo "Verifying model is responding before starting load test..."
          python scripts/locust/locust_v2/tests/warmup_check.py
          echo ""

      - name: Run Locust Load Test
        env:
          CLARIFAI_PAT: ${{ inputs.pat }}
          CLARIFAI_MODEL_URL: ${{ inputs.model_url }}
          CLARIFAI_DEPLOYMENT_USER_ID: ${{ inputs.deployment_user_id }}
          PYTHONPATH: ${{ github.workspace }}/scripts/locust:$PYTHONPATH
        run: |
          echo "Starting load test..."
          echo "Environment: ${{ inputs.environment }}"

          # Determine which test file to use
          if [ "${{ inputs.environment }}" == "test" ]; then
            TEST_FILE="scripts/locust/locust_v2/tests/mock_test.py"
            echo "Using MOCK test file (no real API calls)"
          else
            TEST_FILE="scripts/locust/locust_v2/tests/new_inference.py"
            echo "API Base: $CLARIFAI_API_BASE"
            echo "Model URL: $CLARIFAI_MODEL_URL"
          fi

          echo "Duration: ${{ inputs.duration }} seconds"
          echo "Users: ${{ inputs.users }}"
          echo "Spawn Rate: ${{ inputs.spawn_rate }}"

          # Calculate total runtime with 5 second buffer for extra safety
          TOTAL_DURATION=$((${{ inputs.duration }} + 5))
          echo "Total runtime (with 5s buffer): ${TOTAL_DURATION} seconds"

          # Run locust in headless mode to ensure HTML report generation
          # Note: Headless mode is required for --html flag to work properly
          locust \
            -f ${TEST_FILE} \
            --autoquit 2 \
            --autostart \
            --users ${{ inputs.users }} \
            --spawn-rate ${{ inputs.spawn_rate }} \
            --run-time ${TOTAL_DURATION}s \
            --html locust_report.html \
            --csv locust_results \
            --host=http://localhost

          echo "Test completed. Reports generated."

          # Verify HTML report was created
          if [ -f locust_report.html ]; then
            echo "✓ HTML report generated successfully"
            ls -lh locust_report.html
          else
            echo "✗ WARNING: HTML report not found"
          fi

      - name: Display Test Results
        if: always()
        run: |
          echo "=== Load Test Summary ==="
          if [ -f locust_results_stats.csv ]; then
            echo "Stats:"
            cat locust_results_stats.csv
            echo ""
          fi

          if [ -f locust_results_failures.csv ]; then
            echo "Failures:"
            cat locust_results_failures.csv
            echo ""
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-test-results-${{ github.run_number }}
          path: |
            locust_report.html
            locust_results*.csv
            locust_*.log
          retention-days: 30

      - name: Comment Results Summary
        if: always() && github.event_name == 'workflow_dispatch'
        run: |
          echo "### Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Model URL:** ${{ inputs.model_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Duration:** ${{ inputs.duration }}s" >> $GITHUB_STEP_SUMMARY
          echo "**Users:** ${{ inputs.users }}" >> $GITHUB_STEP_SUMMARY
          echo "**Spawn Rate:** ${{ inputs.spawn_rate }}/s" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f locust_results_stats.csv ]; then
            echo "#### Statistics" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat locust_results_stats.csv >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the full HTML report from the artifacts section above." >> $GITHUB_STEP_SUMMARY
