name: OpenRouter Stats

on:
  schedule:
    # Run every 8 hours
    - cron: '0 */8 * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main for testing
  push:
    branches:
      - main

jobs:
  extract-stats:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache Playwright
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r OpenRouter-Monitor/requirements.txt
          python -m playwright install --with-deps chromium
      
      - name: Extract and notify for all models
        env:
          OPENROUTER_SLACK_BOT_TOKEN: ${{ secrets.OPENROUTER_SLACK_BOT_TOKEN }}
        run: cd OpenRouter-Monitor && python extract_and_notify.py --all
