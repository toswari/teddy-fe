**Design Styles - Identify by these visual characteristics:**
• Scandinavian: Clean lines, light colors, natural materials, functional furniture, minimal decoration
• Nordic: Hygge elements, cozy textures, warm lighting, natural wood tones
• Minimalist: Extremely clean, uncluttered spaces, neutral colors, simple geometric forms
• Japandi: Natural materials, earth tones, clean lines, zen-like calm
• Mid-century modern: Tapered legs, geometric shapes, bold colors, vintage 1950s-60s aesthetic
• Contemporary: Sleek surfaces, neutral colors, open spaces, latest technology integration
• Industrial: Raw materials, exposed brick/metal/pipes, dark colors, utilitarian aesthetic
• Farmhouse: Natural wood, vintage elements, cozy textiles, country-inspired accessories
• Modern cottage: Cozy comfort, soft colors, comfortable seating, relaxed atmosphere
• Traditional: Classic designs, rich colors, ornate details, symmetrical layouts
• Boho: Eclectic mix, vibrant colors, layered textiles, plants, artistic elements
• Rustic: Natural materials, weathered finishes, earth tones, handcrafted elements
• Coastal: Light colors, natural textures, nautical elements, blue and white color palette
• Urban: Space-efficient, modern materials, multifunctional furniture, compact design
• Transitional: Blend of traditional and contemporary, balanced mix, timeless appeal
• Eclectic: Mix of multiple styles and periods, personal collections, bold combinations

DESIGN STYLES CLASSIFICATION GUIDE (use this to improve accuracy):
• Decision steps (apply in order):
    1) Materials: Natural wood + light fabrics → Scandinavian/Nordic; mixed wood + tatami/bamboo → Japandi; raw metal/bricks → Industrial; reclaimed wood + vintage finishes → Farmhouse/Rustic; glossy lacquer/stone + clean edges → Contemporary
    2) Color palette: Light neutrals (white/grey/beige) → Scandinavian/Minimalist; earth tones (taupe, clay, sand) → Japandi; bold accents (mustard/teal/orange) with vintage shapes → Mid-century; dark/charcoal with metal → Industrial; blue/white with rope/rattan → Coastal
    3) Lines & forms: Very simple rectangles, flush fronts → Minimalist; rounded organic forms + tapered legs → Mid-century; shaker panels, X-bracing → Farmhouse; mixed forms and patterns → Boho/Eclectic; balanced classic symmetry → Traditional
    4) Texture & textiles: Layered rugs/throws/patterns → Boho; linen/cotton, light drapery → Scandinavian; raw textures (concrete, brick) → Industrial; tufted upholstery, molding → Traditional/Transitional
    5) Era cues: Caning, spindle backs, tapered legs → Mid-century/Scandi; shiplap, barn doors → Farmhouse; panel molding, wainscoting → Traditional/Transitional

• Common confusion pairs (how to tell apart):
    - Scandinavian vs Minimalist: Both are clean; Scandinavian adds warmth (wood, cozy textiles, soft lighting) while Minimalist is more austere and sparse.
    - Japandi vs Minimalist: Japandi uses natural/earthy palette and Japanese craft cues (low furniture, tatami/bamboo), Minimalist prioritizes pure function and reduction.
    - Farmhouse vs Rustic vs Modern cottage: Farmhouse has refined country cues (shaker, X-bracing); Rustic looks rough-hewn/weathered; Modern cottage is softer, light, and cozy with contemporary comfort.
    - Contemporary vs Mid-century modern: Contemporary follows current sleek trends with flush planes and neutral palettes; Mid-century has vintage cues: tapered legs, walnut tones, retro colors.
    - Industrial vs Urban: Industrial shows raw building elements (exposed pipes, brick, ducts); Urban is compact, multifunctional, modern without raw structural exposure.
    - Coastal vs Scandinavian: Both light/airy; Coastal shows nautical cues (rope, stripes, driftwood, blue/white); Scandinavian leans white/natural wood with minimal nautical motifs.

• Negative checks (what it is not):
    - If ornate carvings, heavy symmetry, and rich colors → Not Minimalist/Scandinavian; likely Traditional/Transitional.
    - If exposed ducting/brick + metal frames → Not Contemporary; likely Industrial.
    - If multiple bold mixed patterns, plants, collected artifacts → Not Minimalist; likely Boho/Eclectic.

• Evidence requirement:
    - When reporting Design Style, include 2–3 concrete visual cues observed (materials, shapes, textures, colors) to justify the classification.

**Life Activities - What could happen in this space:**
• Sleep: Resting, bedroom comfort, bedtime routines, relaxation
• Store & organise: Decluttering, organizing systems, storage solutions, space optimization  
• Cook: Food preparation, meal planning, kitchen organization, dining, entertaining
