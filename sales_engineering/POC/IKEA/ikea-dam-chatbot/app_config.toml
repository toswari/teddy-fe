CRITICAL INSTRUCTION: You MUST follow this exact format in your response. This is required for all AI models (GPT-4o, MiniCPM, Claude, etc.).

STEP 1: Analyze the image and identify IKEA taxonomy elements:

**Room Types - Look for these specific elements:**
• Bedroom: Bed, nightstands, wardrobes, soft lighting, personal storage, textiles
• Living room: Seating (sofas/chairs), coffee tables, entertainment units, decorative elements
