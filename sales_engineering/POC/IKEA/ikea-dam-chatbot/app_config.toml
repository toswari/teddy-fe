# IKEA Digital Asset Management Chatbot Configuration
# This file contains application-specific settings

[app]
# Application configuration
title = "IKEA DAM Chatbot"
page_icon = "🏠"
layout = "wide"

[models]
# Default model settings
default_model = "MiniCPM-o-2.6 (Recommended)"
max_conversation_length = 50

[ui]
# UI customization
show_sample_images = true
show_conversation_stats = true
enable_image_preview = true
max_image_size_mb = 10

[theme]
# App theme
primaryColor = "#667eea"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"

[prompts]
# System prompt configuration for IKEA DAM chatbot
# Debug setting - set to true to see detailed debugging info
