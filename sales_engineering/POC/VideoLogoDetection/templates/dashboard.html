{% extends "base.html" %}
{% block content %}
<section class="grid gap-6 md:grid-cols-3">
  <div class="rounded-2xl bg-white p-6 shadow-sm">
    <p class="text-sm uppercase tracking-wide text-slate-400">Active Project</p>
    <h2 class="mt-2 text-2xl font-semibold" id="active-project">Loading…</h2>
    <p class="mt-3 text-sm text-slate-500" id="project-description"></p>
    <button class="mt-4 rounded-full bg-slate-900 px-4 py-2 text-sm font-medium text-white" id="new-project-btn">New Project</button>
  </div>
  <div class="rounded-2xl bg-white p-6 shadow-sm md:col-span-2">
    <p class="text-sm uppercase tracking-wide text-slate-400">Video Queue</p>
    <ul class="mt-4 space-y-3" id="video-list"></ul>
    <button class="mt-4 rounded-full border border-slate-900 px-4 py-2 text-sm font-medium" id="upload-video-btn">Register Video</button>
  </div>
</section>

<section class="mt-8 rounded-2xl bg-white p-6 shadow-sm">
  <div class="flex items-center justify-between">
    <div>
      <p class="text-sm uppercase tracking-wide text-slate-400">Inference Runs</p>
      <h3 class="text-xl font-semibold">Recent Activity</h3>
    </div>
    <span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700" id="cost-pill">$0 projected</span>
  </div>
  <div class="mt-6 grid gap-4 md:grid-cols-2" id="inference-cards"></div>
</section>
{% endblock %}
