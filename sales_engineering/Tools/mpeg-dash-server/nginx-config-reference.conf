server {
    listen 5443 ssl;
    server_name clarifai-lab.ddns.net;

    ssl_certificate /etc/letsencrypt/live/clarifai-lab.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clarifai-lab.ddns.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 2g;

    # Enable basic auth for entire server
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd-mpeg-dash;

    # API media endpoint - no auth required
    location /api/media {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000/api/media;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Health check endpoint - no auth required
    location /healthz {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # DASH packaging endpoint - no auth required
    location /api/dash/package {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000/api/dash/package;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # HLS endpoints - no auth required for streaming operations
    location /api/hls/register {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000/api/hls/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/hls/upload {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000/api/hls/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/hls/streams {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000/api/hls/streams;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Health + API (FastAPI backend)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Video streaming - no auth required for playback
    location /video {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000/video;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_request_buffering off;
    }

    location /dash/ {
        auth_basic off;  # Allow unauthenticated access to DASH segments
        alias /Volumes/DataExt/ext-clarifai/mpeg-dash/media/dash/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';
        add_header Access-Control-Allow-Headers '*';
        expires 1m;
    }

    # Logout endpoint - forces browser to clear cached credentials
    location /logout {
        auth_basic "Logged out - close browser to complete";
        auth_basic_user_file /etc/nginx/.htpasswd-invalid;
        return 401;
    }

    # Streamlit UI (with WebSocket support)
    location / {
        proxy_pass http://127.0.0.1:8501/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }
}
