<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Completed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 32px;
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .scrollable-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .list-group-item {
            border-radius: 5px;
            margin-bottom: 5px;
            cursor: pointer;
        }
        .list-group-item:hover {
            background-color: #f0f0f0;
        }
        .col {
            padding: 0 15px;
        }
        h2 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Process Completed</h1>
        
        <div class="row">
            <div class="col">
                <h2>Failed IDs</h2>
                <div class="scrollable-list">
                    <ul class="list-group">
                        {% for failed_id in session['failed_ids'] %}
                            <li class="list-group-item">{{ failed_id }}</li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
            <div class="col">
                <h2>Completed IDs</h2>
                <div class="scrollable-list">
                    <ul class="list-group">
                        {% for completed_id in session['completed_ids'] %}
                            <li class="list-group-item">{{ completed_id }}</li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
        
    </div>
</body>
</html>
