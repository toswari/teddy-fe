stages:
  - prepare
  - build
  - gather
  - test

# Stage 1: Prepare the files needed for the build. This is a work in progress and will need to be tied to a requirements file..
prepare_files:
  stage: prepare
  image: alpine
  script:
    - echo "Preparing requirements.txt and download_debs.sh..."
    - mkdir -p build
    - |
      cat <<EOF > build/requirements.txt
      apt-transport-https=2.0.10
      base-files=11ubuntu5.8
      base-passwd=3.5.47
      bash=5.0-6ubuntu1.2
      ca-certificates=20240203~20.04.1
      chrony=3.5-6ubuntu6.2
      cloud-init=24.4-0ubuntu1~20.04.1
      conntrack=1:1.4.5-2
      containerd.io=1.6.16-1
      cuda-toolkit-12-5
      curl=7.68.0-1ubuntu2.25
      dash=0.5.10.2-6
      diffutils=1:3.7-3
      eatmydata=105-7
      findutils=4.7.0-1ubuntu1
      google-compute-engine=20240607.00-0ubuntu1~20.04.0
      google-compute-engine-oslogin=20240701.00-0ubuntu1~20.04.0
      google-guest-agent=20240716.00-0ubuntu1~20.04.0
      google-osconfig-agent=20240524.03-0ubuntu2~20.04.0
      gpg=2.2.19-3ubuntu2.2
      grep=3.4-1
      grub-pc=2.04-1ubuntu26.17
      gzip=1.10-0ubuntu4.1
      hostname=3.23
      init=1.57
      ipvsadm=1:1.31-1
      jq=1.6-1ubuntu0.20.04.1
      kubeadm=1.29.11-1.1
      kubectl=1.29.11-1.1
      kubelet=1.29.11-1.1
      libdebconfclient0=0.251ubuntu1
      libeatmydata1=105-7
      libsodium23=1.0.18-1
      libwrap0=7.6.q-30
      linux-base=4.5ubuntu3.7
      linux-gcp=5.15.0.1074.83~20.04.1
      ncurses-base=6.2-0ubuntu2.1
      ncurses-bin=6.2-0ubuntu2.1
      ncurses-term=6.2-0ubuntu2.1
      nvidia-driver-535
      nvidia-utils-535
      openssh-server=1:8.2p1-4ubuntu0.11
      openssh-sftp-server=1:8.2p1-4ubuntu0.11
      python3-distutils=3.8.10-0ubuntu1~20.04
      python3-importlib-metadata=1.5.0-1
      python3-jinja2=2.10.1-2ubuntu0.3
      python3-json-pointer=2.0-0ubuntu1
      python3-jsonpatch=1.23-3
      python3-jsonschema=3.2.0-0ubuntu2
      python3-lib2to3=3.8.10-0ubuntu1~20.04
      python3-markupsafe=1.1.0-1build2
      python3-more-itertools=4.2.0-1build1
      python3-nacl=1.3.0-5
      python3-pymacaroons=0.13.0-3
      python3-pyrsistent=0.15.5-1build1
      python3-serial=3.4-5.1
      python3-setuptools=45.2.0-1ubuntu0.2
      python3-zipp=1.0.0-1ubuntu0.1
      shim-signed=1.40.10+15.8-0ubuntu1
      software-properties-common=0.99.9.12
      ssh-import-id=5.10-0ubuntu1
      sysvinit-utils=2.96-2.1ubuntu1
      ubuntu-minimal=1.450.2
      ubuntu-server=1.450.2
      ubuntu-standard=1.450.2
      EOF
    - |
      cat <<'EOF' > build/download_debs.sh
      #!/bin/bash

      set -euo pipefail

      WORK_DIR="/deb_files"
      OUTPUT_DIR="/output"

      mkdir -p "$WORK_DIR"

      echo "Processing requirements file..."
      if command -v dos2unix > /dev/null 2>&1; then
          dos2unix /app/requirements.txt
      fi
      sed -i '/^[[:space:]]*$/d' /app/requirements.txt
      sed -i 's/^[[:space:]]*//;s/[[:space:]]*$//' /app/requirements.txt
      echo "Requirements file updated."

      echo "Updating package cache..."
      apt-get update > /dev/null

      if ! command -v apt-rdepends > /dev/null 2>&1; then
          echo "Installing apt-rdepends..."
          apt-get install -y apt-rdepends
      fi

      while read -r package; do
          echo "Processing package: $package"
          if [[ "$package" == *"*"* ]]; then
              echo "Wildcard detected: $package"
              package_list=$(apt-cache search "^${package//\*/.*}" | awk '{print $1}')
              if [[ -z "$package_list" ]]; then
                  echo "No matches found for wildcard: $package"
                  continue
              fi
          else
              package_list=$package
          fi

          for resolved_package in $package_list; do
              echo "Downloading $resolved_package and dependencies..."
              dependencies=$(apt-rdepends "$resolved_package" 2>/dev/null | grep -E "^\S" | grep -v "^ " | sort -u)
              for dep in $dependencies; do
                  if apt-get download "$dep" > /dev/null 2>&1; then
                      echo "Downloaded: $dep"
                      mv ./*.deb "$WORK_DIR/" || echo "Failed to move $dep"
                  else
                      echo "Failed to download: $dep"
                  fi
              done
          done
      done < /app/requirements.txt

      echo "All dependencies downloaded to $WORK_DIR."

      # Create the tarball
      if [ -d "$WORK_DIR" ]; then
          mkdir -p "$OUTPUT_DIR"
          echo "Creating dependencies tarball..."
          tar -czf "$OUTPUT_DIR/dependencies.tar.gz" -C "$WORK_DIR" .
          echo "Tarball created at $OUTPUT_DIR/dependencies.tar.gz"
      else
          echo "No dependencies were downloaded."
          exit 1
      fi
      EOF
    - chmod +x build/download_debs.sh
  artifacts:
    paths:
      - build/requirements.txt
      - build/download_debs.sh

# Stage 2: Build Docker Image for Specific OS and ensure proper repos are added. *** Ubuntu 20.04 + Kubernetes 1.29
build_docker_image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Building Docker image..."
    - cp build/requirements.txt .
    - cp build/download_debs.sh .
    - |
      cat <<'EOF' > Dockerfile
      FROM ubuntu:20.04 as base

      WORKDIR /app

      # Install basic dependencies
      RUN apt-get update && apt-get install -y --no-install-recommends \
          apt-utils \
          wget \
          apt-transport-https \
          curl \
          gnupg \
          dos2unix \
          ca-certificates \
          software-properties-common \
          && update-ca-certificates \
          && rm -rf /var/lib/apt/lists/*

      # Add graphics drivers repository
      RUN add-apt-repository ppa:graphics-drivers/ppa && apt-get update

      # Install apt-rdepends for dependency resolution
      RUN apt-get install -y apt-rdepends

      # Add Kubernetes package repository
      RUN mkdir -p /etc/apt/keyrings && \
          curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring-v1.29.gpg && \
          echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring-v1.29.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /' \
          | tee /etc/apt/sources.list.d/kubernetes-v1.29.list

      # Add Docker repository
      RUN curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg && \
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu focal stable" \
          | tee /etc/apt/sources.list.d/docker.list > /dev/null

      # Add NVIDIA CUDA repository
      RUN wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/x86_64/cuda-ubuntu2004.pin && \
          mv cuda-ubuntu2004.pin /etc/apt/preferences.d/cuda-repository-pin-600 && \
          wget https://developer.download.nvidia.com/compute/cuda/12.5.0/local_installers/cuda-repo-ubuntu2004-12-5-local_12.5.0-555.42.02-1_amd64.deb && \
          dpkg -i cuda-repo-ubuntu2004-12-5-local_12.5.0-555.42.02-1_amd64.deb && \
          cp /var/cuda-repo-ubuntu2004-12-5-local/cuda-*-keyring.gpg /usr/share/keyrings/

      # Copy application-specific scripts and requirements
      COPY requirements.txt /app/requirements.txt
      COPY download_debs.sh /app/download_debs.sh
      RUN chmod +x /app/download_debs.sh

      # Set the entrypoint
      ENTRYPOINT ["/bin/bash", "/app/download_debs.sh"]
      EOF
    - docker build -t custom-ubuntu:latest .
    - docker save custom-ubuntu:latest | gzip > custom-ubuntu.tar.gz
  artifacts:
    paths:
      - custom-ubuntu.tar.gz


# Stage 3: Gather dependencies and pack them into a tar ball that can be shared
gather_dependencies:
  stage: gather
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Restoring Docker image..."
    - gunzip < custom-ubuntu.tar.gz | docker load
    - echo "Running Docker container to gather dependencies..."
    - mkdir -p build/dependencies
    - chmod -R 777 build/dependencies
    - docker run --rm -v $(pwd)/build/dependencies:/output custom-ubuntu:latest
    - echo "Checking contents of build/dependencies directory:"
    - ls -lh build/dependencies/
  artifacts:
    paths:
      - build/dependencies/dependencies.tar.gz

# Stage 4: Simpel test stage to ensure the file was created.
test_dependencies_tar:
  stage: test
  image: alpine
  script:
    - echo "Validating tarball..."
    - tar -tzf build/dependencies/dependencies.tar.gz
