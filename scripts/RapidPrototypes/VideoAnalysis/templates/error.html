<!DOCTYPE html>
<html lang="en">
<head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

            <svg class="mx-auto h-12 w-12 text-red-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
