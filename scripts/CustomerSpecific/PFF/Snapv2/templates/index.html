<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Snap Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .progress-bar {
            transition: width 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-3xl font-bold text-center mb-8">Football Snap Detection</h1>
            
            <!-- Upload Form -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <form id="uploadForm" class="space-y-4">
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center">
                        <input type="file" id="videoInput" accept=".mp4,.avi,.mov" class="hidden">
                        <label for="videoInput" class="cursor-pointer">
                            <div class="text-gray-600">
                                <svg class="mx-auto h-12 w-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                                </svg>
                                <p class="text-sm">Drop your video file here or click to browse</p>
                                <p class="text-xs text-gray-500 mt-1">Supported formats: MP4, AVI, MOV</p>
                            </div>
                        </label>
                    </div>
                    <button type="submit" class="w-full bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600 transition-colors" id="uploadButton">
                        Upload and Process
                    </button>
                </form>
            </div>

            <!-- Progress Section -->
            <div id="progressSection" class="hidden bg-white rounded-lg shadow-md p-6 mb-6">
                <h2 class="text-xl font-semibold mb-4">Processing Video</h2>
                <div class="bg-gray-200 rounded-full h-4 mb-2">
                    <div id="progressBar" class="progress-bar bg-blue-500 h-4 rounded-full" style="width: 0%"></div>
                </div>
                <p id="statusText" class="text-sm text-gray-600 text-center"></p>
            </div>

            <!-- Results Section -->
            <div id="resultsSection" class="hidden bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4">Results</h2>
                <div class="space-y-4">
                    <div class="text-center">
                        <h3 class="font-medium mb-2">Snap Moment</h3>
                        <img id="snapGif" src="" alt="Snap Moment" class="mx-auto rounded-lg shadow-md">
                    </div>
                    <div class="text-center">
                        <h3 class="font-medium mb-2">Motion Analysis</h3>
                        <img id="motionGraph" src="" alt="Motion Analysis" class="mx-auto rounded-lg shadow-md">
                    </div>
                    <p id="snapFrame" class="text-center text-gray-700"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTaskId = null;
        const pollInterval = 1000; // 1 second

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('videoInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a video file');
                return;
            }

            // Show progress section
            document.getElementById('progressSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('uploadButton').disabled = true;

            const formData = new FormData();
            formData.append('video', file);

            try {
                const response = await fetch('/detect-snap', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                currentTaskId = data.task_id;
                pollStatus();
            } catch (error) {
                alert('Error: ' + error.message);
                document.getElementById('uploadButton').disabled = false;
            }
        });

        async function pollStatus() {
            if (!currentTaskId) return;

            try {
                const response = await fetch(`/status/${currentTaskId}`);
                const data = await response.json();

                // Update progress
                document.getElementById('progressBar').style.width = `${data.progress}%`;
                document.getElementById('statusText').textContent = `${data.status.charAt(0).toUpperCase() + data.status.slice(1)} - ${data.progress}%`;

                if (data.status === 'completed') {
                    // Show results
                    document.getElementById('progressSection').classList.add('hidden');
                    document.getElementById('resultsSection').classList.remove('hidden');
                    document.getElementById('uploadButton').disabled = false;

                    // Update results
                    document.getElementById('snapGif').src = data.result.gif_url;
                    document.getElementById('motionGraph').src = data.result.graph_url;
                    document.getElementById('snapFrame').textContent = `Snap detected at frame: ${data.result.snap_frame}`;
                    
                    currentTaskId = null;
                } else if (data.status === 'error') {
                    alert('Error processing video: ' + data.error);
                    document.getElementById('progressSection').classList.add('hidden');
                    document.getElementById('uploadButton').disabled = false;
                    currentTaskId = null;
                } else {
                    // Continue polling
                    setTimeout(pollStatus, pollInterval);
                }
            } catch (error) {
                alert('Error checking status: ' + error.message);
                document.getElementById('progressSection').classList.add('hidden');
                document.getElementById('uploadButton').disabled = false;
                currentTaskId = null;
            }
        }

        // File input styling
        document.getElementById('videoInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            if (fileName) {
                const label = this.nextElementSibling;
                label.querySelector('p').textContent = fileName;
            }
        });
    </script>
</body>
</html>
