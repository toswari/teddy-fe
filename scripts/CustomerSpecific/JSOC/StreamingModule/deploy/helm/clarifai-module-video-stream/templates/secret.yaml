{{ if .Values.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name | quote }}
type: Opaque
data:
  cookieSecret: {{ .Values.config.cookieSecret | b64enc }}
{{ end }}
