version: '3'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./model:/app/model
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
    restart: unless-stopped 