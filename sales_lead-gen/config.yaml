# Configuration for RSS feed processing and message generation

clarifai:
  pat: ""  # Environment variable CLARIFAI_PAT
  url: "https://clarifai.com/openai/chat-completion/models/gpt-oss-120b"
  background_info_file: "background_info.txt"  # Path to file with company/product info

output:
  format: "json"  # Options: json, csv, txt
  filename: "local_messages_{date}.json"  # Use local_ prefix for local testing
  include_metadata: true

# Slack notification settings (configured via environment variables)
slack:
  enabled: true  # Set to false to disable notifications even if credentials are provided
  notification_type: "detailed"  # Options: "summary", "detailed"
  mention_on_high_value: false  # Mention channel when high-value prospects found

search_limit: 200  # Process many more articles for better coverage
message_limit: 150  # Significantly higher message limit
deduplicate_events: true  # Group messages by company and merge duplicate events
article_age_hours: 48  # Expand to 48 hours for more opportunities (weekends, holidays)


