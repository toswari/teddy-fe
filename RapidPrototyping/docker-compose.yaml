version: '3.8'

services:
  # Main web application
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: clarifai-prototyping-web
    ports:
      - "8080:8080"
    environment:
      - CLARIFAI_API_KEY=${CLARIFAI_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OUTPUT_DIR=/app/projects
    volumes:
      # Mount input documents
      - ./inputs:/app/inputs:ro
      # Mount output directory for generated proposals
      - ./projects:/app/projects
      # Mount config for customization
      - ./config:/app/config
      # Mount uploads directory
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

